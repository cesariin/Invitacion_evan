<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Invitación Monster Jam | Evan Alejandro</title>

    <meta name="description" content="Invitación de cumpleaños Monster Jam">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/animations.css">

</head>

<audio autoplay loop preload="auto">
    <source src="assets/audio/monsterjam.mp3" type="audio/mpeg">
</audio>

<body>

    <!-- Fondo -->
    <div class="background"></div>

    <!-- Luces -->
    <div class="lights"></div>

    <!-- Humo -->
    <div class="smoke smoke-left"></div>
    <div class="smoke smoke-center"></div>
    <div class="smoke smoke-right"></div>

    <main class="wrapper">

        <section class="card">

            <!-- Halo -->
            <div class="glow"></div>

            <!-- Imagen -->
            <img
                src="assets/invitacion.jpeg"
                alt="Invitación Monster Jam"
                class="invitation">

            <!-- Brillo -->
            <div class="shine"></div>

        </section>

    </main>

</body>

</html>
