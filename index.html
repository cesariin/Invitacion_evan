<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Invitación Monster Jam | Evan Alejandro</title>

    <meta name="description" content="Invitación de cumpleaños Monster Jam">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/animations.css">

</head>



<body>

    <!-- Fondo -->
    <div class="background"></div>

    <!-- Luces -->
    <div class="lights"></div>

    <!-- Humo -->
    <div class="smoke smoke-left"></div>
    <div class="smoke smoke-center"></div>
    <div class="smoke smoke-right"></div>

    <main class="wrapper">

        <section class="card">

            <!-- Halo -->
            <div class="glow"></div>

            <!-- Imagen -->
            <img
                src="assets/invitacion.jpeg"
                alt="Invitación Monster Jam"
                class="invitation">

            <!-- Brillo -->
            <div class="shine"></div>

        </section>

    </main>

    <audio id="invitationAudio" loop preload="auto" playsinline webkit-playsinline>
        <source src="assets/audio/monsterjam.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('invitationAudio');
        let started = false;

        const tryPlay = async () => {
            if (started) return;

            try {
                audio.volume = 0.7;
                await audio.play();
                started = true;
            } catch (error) {
                console.log('El audio aún no puede iniciarse:', error);
            }
        };

        const startAudio = () => {
            tryPlay();
            setTimeout(() => tryPlay(), 200);
            setTimeout(() => tryPlay(), 800);
        };

        document.addEventListener('touchstart', startAudio, { once: true });
        document.addEventListener('click', startAudio, { once: true });
    </script>

</body>

</html>
